# ─── Server ────────────────────────────────────────────────────────────────────
server.port=8081

# ─── DataSource ─────────────────────────────────────────────────────────────────
# Override these three via environment variables at runtime:
#   SPRING_DATASOURCE_URL      e.g. jdbc:mysql://localhost:3306/itemsdb
#   SPRING_DATASOURCE_USERNAME e.g. root
#   SPRING_DATASOURCE_PASSWORD e.g. secret
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/itemsdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:secret}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ─── JPA / Hibernate ────────────────────────────────────────────────────────────
# 'update' keeps the schema in sync with entities without dropping data.
# Use 'validate' or a migration tool (Flyway/Liquibase) in production.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ─── SQL Initialisation ─────────────────────────────────────────────────────────
# Run data.sql after the schema has been created by Hibernate
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ─── OAuth2 Resource Server (Keycloak JWT) ──────────────────────────────────────
# Override via environment variable at runtime:
#   SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
#   e.g. http://keycloak:8080/realms/myrealm
spring.security.oauth2.resourceserver.jwt.issuer-uri=${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8080/realms/myrealm}
